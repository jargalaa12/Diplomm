name: itrip_app
description: iTrip Mongolia Flutter Application

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.10.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # =========================
  # NETWORKING
  # =========================
  http: ^1.2.0
  dio: ^5.4.0

  # =========================
  # UI / DESIGN
  # =========================
  carousel_slider: ^5.0.0
  fluttertoast: ^8.2.14
  image_picker: ^1.0.7
  sizer: ^2.0.15
  flutter_svg: ^2.0.9
  google_fonts: ^6.1.0
  cached_network_image: ^3.3.1
  lottie: ^3.1.0
  flutter_spinkit: ^5.2.0
  cupertino_icons: ^1.0.8
  smooth_page_indicator: ^1.1.0

  # =========================
  # STATE MANAGEMENT
  # =========================
  provider: ^6.1.2

  # =========================
  # LOCAL STORAGE
  # =========================
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0

  # =========================
  # UTILITIES
  # =========================
  intl: ^0.19.0
  logger: ^2.0.2
  connectivity_plus: ^6.1.4
  email_validator: ^2.1.17

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
